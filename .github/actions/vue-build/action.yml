name: Vue Build
description: Build vue project

inputs:
  working-directory:
    required: true
    description: "Location of package.json file"

runs:
  using: composite
  steps:
    - name: Install
      working-directory: ${{ inputs.working-directory }}
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Test
      working-directory: ${{ inputs.working-directory }}
      shell: bash
      run: pnpm test

    - name: Build
      working-directory: ${{ inputs.working-directory }}
      shell: bash
      run: pnpm build